name: Laravel + React CI/CD → Railway

on:
  push:
    branches:
      - main        # Triggers on push to main branch
  pull_request:
    branches:
      - main        # Runs tests on PRs but does NOT deploy

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Run Tests (Quality Gate)
  # ─────────────────────────────────────────
  test:
    name: Run Laravel Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: laravel_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, ctype, fileinfo, curl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: server/vendor
          key: composer-${{ hashFiles('server/composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: cd server && composer install --no-dev --optimize-autoloader --no-interaction

      - name: Copy .env for testing
        run: cd server && cp .env.example .env

      - name: Set test environment variables
        run: |
          cd server
          echo "APP_KEY=" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=laravel_test" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=root" >> .env

      - name: Generate application key
        run: cd server && php artisan key:generate

      - name: Run database migrations
        run: cd server && php artisan migrate --force

      - name: Run tests (PHPUnit)
        run: cd server && php artisan test

  # ─────────────────────────────────────────
  # JOB 2: Deploy to Railway (only on push to main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: test                     # Only runs if tests PASS
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: |
          curl -fsSL https://railway.app/install.sh | bash

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service ${{ secrets.RAILWAY_SERVICE_ID }} \
            --detach
