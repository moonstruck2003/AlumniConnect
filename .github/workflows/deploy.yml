name: AlumniConnect Build Gate

on:
  push:
    branches: [ "dev", "main", "fix/ci-verification" ]
  pull_request:
    branches: [ "dev", "main", "fix/ci-verification" ]

jobs:
  backend-build:
    name: Verify Backend (Laravel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP (8.2 for Laravel 8)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, ctype, fileinfo, curl
          coverage: none

      - name: Verify Build
        run: cd server && composer install --no-interaction --prefer-dist --optimize-autoloader --ignore-platform-reqs

      - name: Run Backend Tests
        run: cd server && php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"

  frontend-build:
    name: Verify Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Build
        run: cd client && npm install && npm run build

      - name: Run Frontend Linting
        run: cd client && npm run lint
