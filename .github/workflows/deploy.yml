name: AlumniConnect Build Gate

on:
  push:
    branches: [ "dev", "main" ]
  pull_request:
    branches: [ "dev", "main" ]

jobs:
  backend-build:
    name: Verify Backend (Laravel)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP (8.2 for Laravel 8)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, ctype, fileinfo, curl
          coverage: none

      - name: Verify Build
        run: cd server && composer install --no-interaction --prefer-dist --optimize-autoloader

  frontend-build:
    name: Verify Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (v20)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify Build
        run: cd client && npm install && npm run build
