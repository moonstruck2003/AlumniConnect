name: CI/CD → Railway

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Backend Check (PHP 8.4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, ctype, fileinfo, curl
          coverage: none

      - name: Install Secure Dependencies
        run: |
          cd server
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Verify Laravel Artisan
        run: |
          cd server
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret --no-interaction
          php artisan optimize:clear

  test-frontend:
    name: Frontend Check (React 18)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Verify Npm Install & Vite Build
        run: |
          cd client
          npm install
          npm run build

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        run: |
          npx @railway/cli link --project $RAILWAY_PROJECT_ID --service $RAILWAY_SERVICE_ID
          npx @railway/cli up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

