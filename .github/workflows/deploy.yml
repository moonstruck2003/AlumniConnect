name: CI Quality Gate

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  test-backend:
    name: Backend Check (PHP 8.4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, xml, bcmath, ctype, fileinfo, curl
          coverage: none

      - name: Install Dependencies
        run: |
          cd server
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Verify Laravel
        run: |
          cd server
          cp .env.example .env
          php artisan key:generate
          php artisan jwt:secret --no-interaction
          php artisan optimize:clear

  test-frontend:
    name: Frontend Check (React 18)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build Frontend
        run: |
          cd client
          npm install
          npm run build
